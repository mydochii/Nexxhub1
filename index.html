<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Viral Terbaru</title>

<style>
body{
margin:0;
background:#0f0f0f;
font-family:Arial;
color:white;
}
header{
text-align:center;
padding:15px;
background:#1a1a1a;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:10px;
padding:10px;
}
.card{
background:#1a1a1a;
border-radius:8px;
overflow:hidden;
cursor:pointer;
}
.card video{
width:100%;
height:120px;
object-fit:cover;
}
.title{
font-size:13px;
padding:8px;
text-align:center;
}
.player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
}
.player video{
width:95%;
max-width:800px;
}
.close{
position:absolute;
top:10px;
right:15px;
font-size:28px;
cursor:pointer;
}
.pagination{
text-align:center;
padding:20px;
}
button{
padding:10px 20px;
border:none;
border-radius:20px;
margin:5px;
cursor:pointer;
}
</style>
</head>

// random
videoList.sort(()=>Math.random()-0.5);

let page=1;
const perPage=8;

function renderVideos(){

const grid=document.getElementById("grid");
grid.innerHTML="";

let start=(page-1)*perPage;
let end=start+perPage;

videoList.slice(start,end).forEach(v=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<video src="${v}" muted preload="metadata" playsinline></video>
<div class="title">Video</div>
`;

card.onclick=()=>{

const video=document.getElementById("mainVideo");

video.src=v;

document.getElementById("player").style.display="flex";

openAd();

video.dataset.adShown=false;

video.ontimeupdate=function(){
if(video.currentTime>20 && video.dataset.adShown=="false"){
video.dataset.adShown=true;
openAd();
}
};

};

grid.appendChild(card);

});

}

function nextPage(){
if(page*perPage<videoList.length){
page++;
openAd();
renderVideos();
}
}

function prevPage(){
if(page>1){
page--;
openAd();
renderVideos();
}
}

function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("mainVideo").pause();
}

renderVideos();

</script>
